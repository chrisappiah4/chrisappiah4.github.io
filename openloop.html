<!DOCTYPE HTML>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
    <style>
        /* Force content visibility */
        #main { opacity: 1 !important; display: block !important; pointer-events: none; }
        #main article { display: block !important; opacity: 1 !important; position: relative; pointer-events: auto; }
        
        /* Force background blur */
        #bg { cursor: default !important; }
        #bg:after {
            content: '';
            display: block;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        /* The Close Button Styling (Instant) */
        #main article .close-link {
            position: absolute !important;
            top: 0 !important; right: 0 !important;
            width: 4rem; height: 4rem;
            cursor: pointer !important;
            z-index: 1000;
            text-indent: 4rem;
            overflow: hidden;
            border-bottom: none !important;
        }

        /* The Visible X Icon */
        #main article .close-link:before {
            content: '';
            display: block;
            position: absolute;
            top: 0.75rem; right: 0.75rem;
            width: 2.5rem; height: 2.5rem;
            border-radius: 100%;
            background-position: center;
            background-repeat: no-repeat;
            background-image: url("data:image/svg+xml;charset=utf8,%3Csvg xmlns='http://w3.org' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%23ffffff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cline x1='18' y1='6' x2='6' y2='18'%3E%3C/line%3E%3Cline x1='6' y1='6' x2='18' y2='18'%3E%3C/line%3E%3C/svg%3E");
        }

        #main article .close-link:hover:before { background-color: rgba(255, 255, 255, 0.1); }
    </style>
</head>

                <!-- THE X BUTTON -->

<li><a href="index.html#work" class="button">Back to Portfolio</a></li>

        <footer id="footer">
