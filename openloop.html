    <head>
    <link rel="stylesheet" href="assets/css/main.css" />
    <style>
        /* Force the content to be visible */
        #main { opacity: 1 !important; display: block !important; }
        #main article { display: block !important; opacity: 1 !important; }
        #main article .close {
            position: absolute !important;
            top: 0 !important;
            right: 0 !important;
            width: 4rem;
            height: 4rem;
            cursor: pointer;
            z-index: 10;
            text-indent: 4rem;
            overflow: hidden;
        }

        #main article .close:before {
            content: '';
            display: block;
            position: absolute;
            top: 0.75rem;
            right: 0.75rem;
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 100%;
            background-position: center;
            background-image: url("data:image/svg+xml;charset=utf8,%3Csvg xmlns='http://w3.org' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%23ffffff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cline x1='18' y1='6' x2='6' y2='18'%3E%3C/line%3E%3Cline x1='6' y1='6' x2='18' y2='18'%3E%3C/line%3E%3C/svg%3E");
            background-repeat: no-repeat;
        }
        
        /* Force the background blur seen in the original theme */
        #wrapper.is-article #bg:after {
            opacity: 1 !important;
        }
        #bg:after {
            content: '';
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.25); /* Darkens bg */
            backdrop-filter: blur(8px); /* Blurs bg */
            -webkit-backdrop-filter: blur(8px);
        }
    </style>
</head>
