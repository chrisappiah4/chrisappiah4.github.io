<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
    <style>
        /* Force Display Fix */
        #wrapper { 
            transition: opacity 0.325s ease-in-out; 
        }
        #main { 
            display: flex !important; 
            opacity: 1 !important; 
            pointer-events: none; 
        }
        #main article { 
            display: block !important; 
            opacity: 1 !important; 
            position: relative; 
            pointer-events: auto;
            transition: opacity 0.325s ease-in-out, transform 0.325s ease-in-out !important;
        }

        /* The Base Close Button Styling */
        #main article .close-link {
            position: absolute !important;
            top: 0 !important;
            right: 0 !important;
            width: 4rem;
            height: 4rem;
            cursor: pointer !important;
            z-index: 1000;
            text-indent: 4rem;
            overflow: hidden;
            border-bottom: none !important;
        }

        /* FIXED SVG URL for Visible X */
        #main article .close-link:before {
            content: '';
            display: block;
            position: absolute;
            top: 0.75rem;
            right: 0.75rem;
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 100%;
            background-position: center;
            background-repeat: no-repeat;
            /* FIXED URL: http://w3.org */
background-image: url("data:image/svg+xml;charset=utf8,%3Csvg xmlns='http://w3.org' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%23ffffff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cline x1='18' y1='6' x2='6' y2='18'%3E%3C/line%3E%3Cline x1='6' y1='6' x2='18' y2='18'%3E%3C/line%3E%3C/svg%3E");
        }

        #main article .close-link:hover:before { background-color: rgba(255, 255, 255, 0.1); }
        
        /* Background & Blur */
        #bg { cursor: default !important; }
        #bg:after {
            content: '';
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: opacity 0.4s ease;
        }
        #bg.fade-out:after { opacity: 0 !important; }

        /* Keep the background solid during the redirect to prevent the grey flash */
#bg {
    transition: opacity 0.5s ease !important;
}

#bg.fade-out:after {
    opacity: 1 !important; /* Forces the blurred image to stay visible */
    background-color: #1b1f22 !important; /* Matches your site background color */
}

    </style>
</head>

 <body class="is-preload">
 <div id="wrapper">
        <div id="bg" onclick="smoothBack()"></div>
        <div id="main">
            <article id="project-details" class="active">
                <!-- THE X BUTTON -->
                <a href="javascript:void(0)" onclick="smoothBack()" class="close-link">Close</a>
                
                <h2 class="major">Trajectory Tracking</h2>
               <p>Multicopter dynamics derivation and simulation for an unideal system(open loop control).</p>
                <p>This project was completed for ENME 430-UAV Dynamics</p>
                
                <ul class="actions">
                    <li><a href="ENME408_S26_Project01_Hardesty_Appiah.pdf" target="_blank" class="button primary">View Project PDF</a></li>
                    <!-- SMOOTH BACK BUTTON -->
                    <li><a href="javascript:void(0)" onclick="smoothBack()" class="button">Back to Portfolio</a></li>
                </ul>
            </article>
        </div>

        <footer id="footer">
            <p class="copyright">&copy; Christopher Appiah. Design: <a href="https://html5up.net">HTML5 UP</a>.</p>
        </footer>
    </div>

    <!-- These scripts are REQUIRED to remove 'is-preload' and apply the blur -->
    <script src="assets/js/jquery.min.js"></script>
    <script src="assets/js/browser.min.js"></script>
    <script src="assets/js/breakpoints.min.js"></script>
    <script src="assets/js/util.js"></script>
    <script src="assets/js/main.js"></script>
   <script>
function smoothBack() {
    var wrapper = document.getElementById('wrapper');
    var article = document.querySelector('#main article');

    // Matches Dimension's "Close" animation exactly
    article.style.transform = 'translateY(0.25rem)';
    article.style.opacity = '0';
    
    // Fade the whole page slightly slower to bridge the gap to index.html
    wrapper.style.transition = 'opacity 0.4s ease';
    wrapper.style.opacity = '0';

    setTimeout(function() {
        window.location.href = 'index.html#work';
    }, 350); // Small buffer to ensure animation completes
}
</script>

</body>
</html>
