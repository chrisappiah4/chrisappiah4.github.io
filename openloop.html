<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
    <style>
    /* Force visibility */
    #main { opacity: 1 !important; display: block !important; }
    #main article { display: block !important; opacity: 1 !important; position: relative; }
    
    /* The Base Close Button Styling */
    #main article .close-link {
        position: absolute !important;
        top: 0 !important;
        right: 0 !important;
        width: 4rem;
        height: 4rem;
        cursor: pointer;
        z-index: 1000;
        text-indent: 4rem;
        overflow: hidden;
        border-bottom: none !important;
    }

    /* The X Icon with the FULL CORRECT URL */
  #main article .close-link:before {
    content: '';
    display: block;
    position: absolute;
    top: 0.75rem;
    right: 0.75rem;
    width: 2.5rem;
    height: 2.5rem;
    border-radius: 100%;
    background-position: center;
    background-repeat: no-repeat;
    /* FIXED URL BELOW */
    background-image: url("data:image/svg+xml;charset=utf8,%3Csvg xmlns='http://w3.org' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%23ffffff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cline x1='18' y1='6' x2='6' y2='18'%3E%3C/line%3E%3Cline x1='6' y1='6' x2='18' y2='18'%3E%3C/line%3E%3C/svg%3E");
    z-index: 1001;
}

    #main article .close-link:hover:before {
        background-color: rgba(255, 255, 255, 0.1);
    }
    
    /* Background Effects */
    #bg:after {
        content: '';
        display: block;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.25);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
    }

        /* Ensure the page starts visible but can transition */
#wrapper {
    opacity: 1;
    transition: opacity 0.5s ease;
}

/* Background: Remove the 'hand' cursor to keep it subtle */
#bg {
    cursor: default !important;
}

/* Close Link: Keep the 'hand' cursor for the actual button */
.close-link {
    cursor: pointer !important;
}

/* Optional: Slight darken on background hover for subtle feedback */
#bg:hover:after {
    background-color: rgba(0, 0, 0, 0.35) !important;
    transition: background-color 0.3s ease;
}

</style>
</head>

<body class="is-preload">
    <div id="wrapper">
        <!-- Background: Use 'default' cursor to match main site feel -->
<div id="bg" onclick="smoothBack()" style="cursor: default;"></div>
        <div id="main">
            <article id="project-details" class="active">
                <!-- SINGLE close button inside the article -->
                <a href="index.html#work" class="close-link">Close</a>
                <h2 class="major">Trajectory Tracking</h2>
                <p>Multicopter dynamics derivation and simulation for an unideal system(open loop control).</p>
                <p>This project was completed for ENME 410-UAV Dynamics</p>



                
                
                <ul class="actions">
                    <!-- Ensure 'Example Project.pdf' is uploaded to your repo -->
                    <li><a href="ENME408_S26_Project01_Hardesty_Appiah.pdf" target="_blank" class="button primary">View Project PDF</a></li>
                    <li><a href="index.html#work" class="button">Back to Portfolio</a></li>
                </ul>
            </article>
        </div>

        <footer id="footer">
            <p class="copyright">&copy; Christopher Appiah. Design: <a href="https://html5up.net">HTML5 UP</a>.</p>
        </footer>
    </div>

    <!-- These scripts are REQUIRED to remove 'is-preload' and apply the blur -->
    <script src="assets/js/jquery.min.js"></script>
    <script src="assets/js/browser.min.js"></script>
    <script src="assets/js/breakpoints.min.js"></script>
    <script src="assets/js/util.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
    function smoothBack() {
        // Triggers the fade-out
        document.getElementById('wrapper').style.opacity = '0';
        
        // Wait 500ms for the CSS transition to finish, then redirect
        setTimeout(function() {
            window.location.href = 'index.html#work';
        }, 500);
    }
    </script>
</body>
</html>
